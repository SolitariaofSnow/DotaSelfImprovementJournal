<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Climb</title>
<style>
  :root{
    --bg:#0D0505; --bg2:#070202; --surface:#160B0A; --surface2:#1E100E;
    --line:#2C1815; --ink:#EFE6E2; --muted:#A18B85; --dim:#6B5650;
    --accent:#C25B4A; --accent2:#DA9078; --accent-soft:rgba(194,91,74,.13);
    --partial:#7E4437; --miss:#3C2B27; --loss:#8F3F3F;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1100px 700px at 82% -8%, #2a0f0b55, transparent 60%),
      radial-gradient(900px 600px at -6% 108%, #220c0955, transparent 55%),
      var(--bg);
    color:var(--ink); font-family:var(--sans);
    line-height:1.5; -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:1040px; margin:0 auto; padding:34px 22px 70px}

  /* header */
  header.top{display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:26px}
  h1{font-family:var(--serif); font-weight:600; font-size:30px; letter-spacing:.2px; margin:0}
  h1 .glyph{color:var(--accent)}
  .io{display:flex; gap:8px}
  .io button{
    background:transparent; border:1px solid var(--line); color:var(--muted);
    font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    padding:7px 11px; border-radius:7px; cursor:pointer; transition:.15s;
  }
  .io button:hover{border-color:var(--dim); color:var(--ink)}

  /* focus card */
  .focus{
    position:relative; border:1px solid #3a1e18; border-radius:16px;
    background:linear-gradient(180deg,#1d0e0b, #150a09); padding:22px 24px; margin-bottom:26px;
    overflow:hidden;
  }
  .focus::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent); box-shadow:0 0 22px 1px #c25b4a55}
  .focus .eyebrow{font-family:var(--mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent2); margin-bottom:9px}
  .focus .current{font-family:var(--serif); font-size:24px; line-height:1.25; color:var(--ink); min-height:30px}
  .focus .current.none{color:var(--dim)}
  .focus .meta{font-family:var(--mono); font-size:11px; color:var(--dim); margin-top:7px}
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:16px}
  .chip{
    display:inline-flex; align-items:center; gap:7px;
    background:#190c0a; border:1px solid var(--line); color:var(--muted);
    font-size:12.5px; padding:6px 12px; border-radius:999px; cursor:pointer; transition:.14s; text-align:left;
  }
  .chip:hover{border-color:var(--accent); color:var(--ink)}
  .chip.active{background:var(--accent-soft); border-color:var(--accent); color:#eec4b8}
  .chip .x{color:var(--dim); font-size:13px; line-height:1; padding:0 1px; visibility:hidden}
  .chip:hover .x{visibility:visible}
  .chip .x:hover{color:var(--ink)}
  .chip.custom{border-style:dashed; color:var(--dim); min-width:34px; justify-content:center}
  .chip.grad{border-color:#5c3128; color:var(--accent2)}
  .chip.grad:hover{border-color:var(--accent)}
  .chip.grad.ready{background:var(--accent-soft); border-color:var(--accent); color:#eec4b8; box-shadow:0 0 14px 0 #c25b4a33}

  /* graduated focuses */
  .climbed{margin-top:15px; padding-top:12px; border-top:1px dashed var(--line)}
  .climbed .ct{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:6px}
  .climbed .ci{font-size:12.5px; color:var(--muted); padding:2.5px 0}
  .climbed .ci .ok{color:var(--accent)}
  .climbed .ci .cs{font-family:var(--mono); font-size:10.5px; color:var(--dim)}

  /* grid */
  .grid{display:grid; grid-template-columns:1.15fr .85fr; gap:22px; align-items:start}
  @media(max-width:760px){ .grid{grid-template-columns:1fr} }

  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px}
  .card h2{font-family:var(--serif); font-weight:600; font-size:18px; margin:0 0 18px}

  /* form */
  .field{margin-bottom:15px}
  label.lbl{display:block; font-family:var(--mono); font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); margin-bottom:7px}
  label.lbl .star{color:var(--accent)}
  input[type=text], textarea{
    width:100%; background:var(--bg2); border:1px solid var(--line); color:var(--ink);
    font-family:var(--sans); font-size:14px; padding:10px 12px; border-radius:9px; resize:vertical;
  }
  input[type=text]:focus, textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  textarea{min-height:52px}
  .row{display:flex; gap:12px}
  .row > *{flex:1}

  .seg{display:flex; gap:7px}
  .seg button{
    flex:1; background:var(--bg2); border:1px solid var(--line); color:var(--muted);
    font-family:var(--sans); font-size:13px; padding:9px 6px; border-radius:9px; cursor:pointer; transition:.14s;
  }
  .seg button:hover{border-color:var(--dim)}
  .seg button.on[data-v=hit]{background:var(--accent-soft); border-color:var(--accent); color:#eec4b8}
  .seg button.on[data-v=partial]{background:#c25b4a12; border-color:var(--partial); color:#d0a294}
  .seg button.on[data-v=miss]{background:#3c2b2733; border-color:var(--dim); color:var(--muted)}
  .seg.res button.on[data-v=win]{border-color:#8a746e; color:#e2d4cf; background:#8a746e1f}
  .seg.res button.on[data-v=loss]{border-color:var(--loss); color:#d9a3a3; background:#8f3f3f22}
  .seg.res button.on[data-v='']{border-color:var(--dim); color:var(--muted)}

  .logbtn{
    width:100%; margin-top:6px; background:var(--accent); color:#200a06; border:none;
    font-family:var(--sans); font-weight:650; font-size:14.5px; padding:13px; border-radius:11px; cursor:pointer; transition:.15s;
  }
  .logbtn:hover{filter:brightness(1.09)}
  .logbtn:active{transform:translateY(1px)}
  .logbtn:disabled{opacity:.45; cursor:not-allowed}

  /* stats */
  .stats{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:22px}
  .stat{background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:14px 15px}
  .stat .n{font-family:var(--mono); font-size:26px; color:var(--ink); line-height:1}
  .stat .n .u{font-size:13px; color:var(--dim)}
  .stat .n.sm{font-size:16.5px; line-height:1.3; padding-top:3px}
  .stat .k{font-size:11px; color:var(--muted); margin-top:6px; letter-spacing:.02em}
  .stat.hl .n{color:var(--accent2)}
  .stat.ac .n{color:var(--accent)}

  /* trail */
  .legend{display:flex; gap:14px; font-family:var(--mono); font-size:10px; letter-spacing:.05em; color:var(--dim); text-transform:uppercase; margin:0 0 6px}
  .legend i{display:inline-block; width:9px; height:9px; border-radius:3px; margin-right:5px; vertical-align:middle}
  .trail{position:relative; margin-top:10px; padding:6px 0}
  .node{position:relative; display:flex; align-items:center; gap:12px; padding:7px 0; min-height:34px}
  .node .dot{width:15px; height:15px; border-radius:5px; flex:none; border:1px solid #0006; transition:.15s}
  .node.hit .dot{background:var(--accent); box-shadow:0 0 12px 0 #c25b4a55}
  .node.partial .dot{background:var(--partial)}
  .node.miss .dot{background:var(--miss)}
  .node .txt{font-size:13px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .node .txt b{color:var(--ink); font-weight:600}
  .node .when{margin-left:auto; font-family:var(--mono); font-size:10.5px; color:var(--dim); flex:none}
  .node .stem{position:absolute; left:7px; top:-7px; height:14px; width:1px; background:var(--line)}
  .node:first-child .stem{display:none}
  .trail.reveal .node{animation:rise .4s ease both}
  @keyframes rise{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}

  /* improvement log */
  .improv{margin-top:24px}
  .improv h2{font-family:var(--serif); font-weight:600; font-size:20px; margin:0 0 16px}
  .entry{border-left:2px solid var(--accent); background:linear-gradient(90deg,#1a0e0b, transparent 70%); padding:12px 16px; border-radius:0 10px 10px 0; margin-bottom:12px}
  .entry .meta{display:flex; gap:10px; align-items:center; font-family:var(--mono); font-size:10.5px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px}
  .entry .meta .hero{color:var(--accent2)}
  .entry .better{font-family:var(--serif); font-size:15.5px; color:var(--ink); line-height:1.45}
  .entry .extra{margin-top:9px; font-size:13px; color:var(--muted); border-top:1px solid var(--line); padding-top:9px}
  .entry .extra b{color:var(--dim); font-weight:600; font-family:var(--mono); font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; display:block; margin-bottom:2px}
  .entry .del{float:right; background:none; border:none; color:var(--dim); cursor:pointer; font-size:15px; line-height:1; padding:0 2px}
  .entry .del:hover{color:var(--accent)}

  .empty{color:var(--dim); font-size:13px; padding:18px 4px; text-align:center; border:1px dashed var(--line); border-radius:12px}

  footer{margin-top:40px; text-align:center; color:var(--dim); font-size:11.5px; font-family:var(--mono); letter-spacing:.04em}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:var(--surface2); border:1px solid var(--accent); color:var(--ink); font-size:13.5px; padding:11px 18px; border-radius:11px; opacity:0; pointer-events:none; transition:.25s}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  @media(prefers-reduced-motion:reduce){ *{animation:none!important; transition:none!important} }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>The <span class="glyph">Climb</span></h1>
    <div class="io">
      <button id="exportBtn" title="Download a backup of your log">Export</button>
      <button id="importBtn" title="Load a previously exported log">Import</button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </div>
  </header>

  <!-- FOCUS -->
  <section class="focus">
    <div class="eyebrow">Focus</div>
    <div class="current none" id="focusCurrent">No focus set</div>
    <div class="meta" id="focusMeta" style="display:none"></div>
    <div class="chips" id="focusChips"></div>
    <div class="climbed" id="climbedList" style="display:none"></div>
  </section>

  <div class="grid">
    <!-- LOG -->
    <section class="card">
      <h2>After the game</h2>

      <div class="field row">
        <div>
          <label class="lbl" for="hero">Hero</label>
          <input type="text" id="hero" list="heroList" autocomplete="off">
          <datalist id="heroList"></datalist>
        </div>
        <div>
          <label class="lbl">Result</label>
          <div class="seg res" id="segResult">
            <button type="button" data-v="win">Win</button>
            <button type="button" data-v="loss">Loss</button>
            <button type="button" data-v="" class="on">Skip</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label class="lbl">Focus hit</label>
        <div class="seg" id="segHit">
          <button type="button" data-v="hit">Yes</button>
          <button type="button" data-v="partial">Partly</button>
          <button type="button" data-v="miss">No</button>
        </div>
      </div>

      <div class="field">
        <label class="lbl" for="better">Better than a month ago <span class="star">★</span></label>
        <textarea id="better"></textarea>
      </div>

      <div class="field">
        <label class="lbl" for="diff">Would do differently</label>
        <textarea id="diff"></textarea>
      </div>

      <div class="field">
        <label class="lbl" for="trigger">Trigger missed</label>
        <input type="text" id="trigger">
      </div>

      <button class="logbtn" id="logBtn" disabled>Log game</button>
    </section>

    <!-- PROGRESS -->
    <section class="card">
      <h2>Progress</h2>

      <div class="stats">
        <div class="stat ac"><div class="n" id="stTotal">0</div><div class="k">games reviewed</div></div>
        <div class="stat hl"><div class="n" id="stStreak">0<span class="u"> d</span></div><div class="k">review streak</div></div>
        <div class="stat"><div class="n" id="stHit">—</div><div class="k">focus hit · last 10</div></div>
        <div class="stat"><div class="n sm" id="stEdge">—</div><div class="k">win rate · focus hit vs missed</div></div>
      </div>

      <div class="legend">
        <span><i style="background:var(--accent)"></i>hit</span>
        <span><i style="background:var(--partial)"></i>partial</span>
        <span><i style="background:var(--miss)"></i>missed</span>
      </div>
      <div class="trail" id="trail"></div>
    </section>
  </div>

  <!-- IMPROVEMENT LOG -->
  <section class="improv">
    <h2>Improvements</h2>
    <div id="improvList"></div>
  </section>

  <footer>
    <div id="saveNote">saved locally in this browser</div>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var KEY = "dota_climb_v1";
  var HEROES = ["Abaddon","Alchemist","Ancient Apparition","Anti-Mage","Arc Warden","Axe","Bane",
    "Batrider","Beastmaster","Bloodseeker","Bounty Hunter","Brewmaster","Bristleback","Broodmother",
    "Centaur Warrunner","Chaos Knight","Chen","Clinkz","Clockwerk","Crystal Maiden","Dark Seer",
    "Dark Willow","Dawnbreaker","Dazzle","Death Prophet","Disruptor","Doom","Dragon Knight",
    "Drow Ranger","Earth Spirit","Earthshaker","Elder Titan","Ember Spirit","Enchantress","Enigma",
    "Faceless Void","Grimstroke","Gyrocopter","Hoodwink","Huskar","Invoker","Io","Jakiro",
    "Juggernaut","Keeper of the Light","Kez","Kunkka","Largo","Legion Commander","Leshrac","Lich",
    "Lifestealer","Lina","Lion","Lone Druid","Luna","Lycan","Magnus","Marci","Mars","Medusa",
    "Meepo","Mirana","Monkey King","Morphling","Muerta","Naga Siren","Nature's Prophet","Necrophos",
    "Night Stalker","Nyx Assassin","Ogre Magi","Omniknight","Oracle","Outworld Destroyer",
    "Pangolier","Phantom Assassin","Phantom Lancer","Phoenix","Primal Beast","Puck","Pudge","Pugna",
    "Queen of Pain","Razor","Riki","Ringmaster","Rubick","Sand King","Shadow Demon","Shadow Fiend",
    "Shadow Shaman","Silencer","Skywrath Mage","Slardar","Slark","Snapfire","Sniper","Spectre",
    "Spirit Breaker","Storm Spirit","Sven","Techies","Templar Assassin","Terrorblade","Tidehunter",
    "Timbersaw","Tinker","Tiny","Treant Protector","Troll Warlord","Tusk","Underlord","Undying",
    "Ursa","Vengeful Spirit","Venomancer","Viper","Visage","Void Spirit","Warlock","Weaver",
    "Windranger","Winter Wyvern","Witch Doctor","Wraith King","Zeus"];

  var state = load();
  var draft = { result:"", hit:"" };

  // ---- persistence ----
  function load(){
    try{
      var raw = localStorage.getItem(KEY);
      if(raw){
        var s = JSON.parse(raw);
        s.graduated = s.graduated || [];
        s.saved = s.saved || [];
        return s;
      }
    }
    catch(e){ flagNoSave(); }
    return { focus:"", entries:[], graduated:[], saved:[] };
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(state)); }
    catch(e){ flagNoSave(); }
  }
  function flagNoSave(){
    var n = document.getElementById("saveNote");
    if(n) n.textContent = "this browser blocks local saves — use Export to keep a backup";
  }

  // ---- helpers ----
  var $ = function(id){ return document.getElementById(id); };
  function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function fmtDate(ts){
    var d = new Date(ts), now = new Date();
    var days = Math.floor((now - d)/86400000);
    if(days===0) return "today";
    if(days===1) return "yesterday";
    if(days<7) return days+"d ago";
    return (d.getMonth()+1)+"/"+d.getDate();
  }
  function toast(msg){
    var t = $("toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(t._h); t._h = setTimeout(function(){ t.classList.remove("show"); }, 1900);
  }

  // ---- focus ----
  function hitPts(x){ return x.hit==="hit"?1:x.hit==="partial"?0.5:0; }
  function focusStats(name){
    var g = state.entries.filter(function(x){ return x.focus===name; });
    if(!g.length) return null;
    var pts = g.reduce(function(a,x){ return a + hitPts(x); },0);
    return { games:g.length, rate:Math.round(pts/g.length*100) };
  }
  function readyToGraduate(name){
    var g = state.entries.filter(function(x){ return x.focus===name; }).slice(-10);
    if(g.length < 5) return false;
    var pts = g.reduce(function(a,x){ return a + hitPts(x); },0);
    return pts/g.length >= 0.8;
  }
  function graduateFocus(){
    if(!state.focus) return;
    var fs = focusStats(state.focus);
    state.graduated.push({
      name: state.focus, ts: Date.now(),
      games: fs ? fs.games : 0, rate: fs ? fs.rate : 0
    });
    state.saved = state.saved.filter(function(s){ return s!==state.focus; });
    state.focus = "";
    save(); renderFocus();
    toast("Graduated.");
  }
  function renderClimbed(){
    var el = $("climbedList");
    if(!state.graduated.length){ el.style.display = "none"; el.innerHTML = ""; return; }
    el.style.display = "";
    var h = '<div class="ct">Graduated</div>';
    state.graduated.slice().reverse().forEach(function(g){
      h += '<div class="ci"><span class="ok">✓</span> ' + esc(g.name)
        + (g.games ? ' <span class="cs">· ' + g.games + ' game' + (g.games===1?"":"s") + ' · ' + g.rate + '%</span>' : '')
        + '</div>';
    });
    el.innerHTML = h;
  }
  function renderFocus(){
    var cur = $("focusCurrent");
    cur.textContent = state.focus || "No focus set";
    cur.classList.toggle("none", !state.focus);
    var fs = state.focus ? focusStats(state.focus) : null;
    var ready = state.focus && readyToGraduate(state.focus);
    var meta = $("focusMeta");
    if(fs){
      meta.style.display = "";
      meta.textContent = fs.games + (fs.games===1?" game":" games") + " · " + fs.rate + "% hit";
    } else {
      meta.style.display = "none";
    }
    var wrap = $("focusChips"); wrap.innerHTML = "";
    state.saved.forEach(function(p){
      var b = document.createElement("button");
      b.className = "chip" + (state.focus===p ? " active":"");
      var t = document.createElement("span"); t.textContent = p; b.appendChild(t);
      var x = document.createElement("span"); x.className = "x"; x.textContent = "×"; x.title = "Remove";
      x.onclick = function(ev){
        ev.stopPropagation();
        state.saved = state.saved.filter(function(s){ return s!==p; });
        if(state.focus===p) state.focus = "";
        save(); renderFocus();
      };
      b.appendChild(x);
      b.onclick = function(){ state.focus = (state.focus===p ? "" : p); save(); renderFocus(); };
      wrap.appendChild(b);
    });
    var c = document.createElement("button");
    c.className = "chip custom"; c.textContent = "+"; c.title = "New focus";
    c.onclick = function(){
      var v = prompt("New focus:", "");
      if(v===null) return;
      v = v.trim();
      if(!v) return;
      if(state.saved.indexOf(v)===-1) state.saved.push(v);
      state.focus = v;
      save(); renderFocus();
    };
    wrap.appendChild(c);
    if(state.focus){
      var g = document.createElement("button");
      g.className = "chip grad" + (ready ? " ready":"");
      g.textContent = "graduate";
      g.title = "Retire this focus as learned";
      g.onclick = graduateFocus;
      wrap.appendChild(g);
    }
    renderClimbed();
  }

  // ---- segmented controls ----
  function wireSeg(segId, key){
    var seg = $(segId);
    seg.querySelectorAll("button").forEach(function(b){
      b.onclick = function(){
        seg.querySelectorAll("button").forEach(function(x){ x.classList.remove("on"); });
        b.classList.add("on");
        draft[key] = b.getAttribute("data-v");
        validate();
      };
    });
  }
  function validate(){
    var ok = draft.hit !== "" && $("better").value.trim().length > 0;
    $("logBtn").disabled = !ok;
  }

  // ---- stats + trail ----
  function computeStreak(entries){
    if(!entries.length) return 0;
    var days = {};
    entries.forEach(function(e){ var d=new Date(e.ts); days[d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate()]=1; });
    var streak=0, cur=new Date();
    for(var i=0;i<400;i++){
      var k=cur.getFullYear()+"-"+cur.getMonth()+"-"+cur.getDate();
      if(days[k]){ streak++; }
      else if(i===0){ /* nothing today yet — allow */ }
      else break;
      cur.setDate(cur.getDate()-1);
    }
    return streak;
  }

  function renderStats(){
    var e = state.entries;
    $("stTotal").textContent = e.length;
    $("stStreak").innerHTML = computeStreak(e) + '<span class="u"> d</span>';

    // win rate when focus hit (incl. partial) vs missed
    var withRes = e.filter(function(x){ return x.result; });
    var hitG  = withRes.filter(function(x){ return x.hit==="hit" || x.hit==="partial"; });
    var missG = withRes.filter(function(x){ return x.hit==="miss"; });
    var edge = $("stEdge");
    if(hitG.length >= 3 && missG.length >= 3){
      var isWin = function(x){ return x.result==="win"; };
      var a = Math.round(hitG.filter(isWin).length / hitG.length * 100);
      var b = Math.round(missG.filter(isWin).length / missG.length * 100);
      edge.innerHTML = a + '%<span class="u"> vs </span>' + b + '%';
      edge.title = "You win " + a + "% when you hit your focus, " + b + "% when you miss it";
    } else {
      edge.textContent = "—";
      edge.title = "Log Win/Loss on a few more games (3+ hits and 3+ misses) to unlock";
    }

    var last = e.slice(-10);
    if(!last.length){ $("stHit").textContent = "—"; return; }
    var pts = last.reduce(function(a,x){ return a + hitPts(x); },0);
    $("stHit").textContent = Math.round(pts/last.length*100) + "%";
  }

  function renderTrail(animate){
    var t = $("trail"); t.innerHTML = "";
    var e = state.entries;
    if(!e.length){ t.innerHTML = '<div class="empty">No games logged yet.</div>'; return; }
    // newest at top
    var recent = e.slice(-14).reverse();
    recent.forEach(function(x){
      var n = document.createElement("div");
      n.className = "node " + x.hit;
      var label = x.better ? x.better : (x.focus || "logged");
      n.innerHTML = '<span class="stem"></span>'
        + '<span class="dot"></span>'
        + '<span class="txt">' + (x.hero?'<b>'+esc(x.hero)+'</b> · ':'') + esc(label) + '</span>'
        + '<span class="when">' + fmtDate(x.ts) + '</span>';
      t.appendChild(n);
    });
    if(animate){ t.classList.remove("reveal"); void t.offsetWidth; t.classList.add("reveal"); }
  }

  // ---- improvement log ----
  function renderImprov(){
    var list = $("improvList"); list.innerHTML = "";
    var e = state.entries.filter(function(x){ return x.better; }).slice().reverse();
    if(!e.length){ list.innerHTML = '<div class="empty">No entries yet.</div>'; return; }
    e.forEach(function(x){
      var d = document.createElement("div");
      d.className = "entry";
      var hitLabel = x.hit==="hit"?"focus hit":x.hit==="partial"?"focus partial":"focus missed";
      var extra = "";
      if(x.diff || x.trigger){
        extra = '<div class="extra"><b>would do differently</b>' + esc(x.diff||"—")
          + (x.trigger ? '<div style="margin-top:7px"><b>trigger missed</b>'+esc(x.trigger)+'</div>' : '') + '</div>';
      }
      d.innerHTML = '<button class="del" title="Delete entry" data-id="'+x.id+'">✕</button>'
        + '<div class="meta">' + (x.hero?'<span class="hero">'+esc(x.hero)+'</span>':'')
        + '<span>'+fmtDate(x.ts)+'</span><span>'+hitLabel+'</span></div>'
        + '<div class="better">' + esc(x.better) + '</div>' + extra;
      list.appendChild(d);
    });
    list.querySelectorAll(".del").forEach(function(b){
      b.onclick = function(){
        if(!confirm("Delete this entry? It also comes off the trail and stats.")) return;
        var id = b.getAttribute("data-id");
        state.entries = state.entries.filter(function(x){ return String(x.id)!==String(id); });
        save(); renderFocus(); renderAll(false);
      };
    });
  }

  function renderAll(animate){ renderStats(); renderTrail(animate); renderImprov(); }

  // ---- log a game ----
  function logGame(){
    var better = $("better").value.trim();
    if(!better || draft.hit==="") return;
    state.entries.push({
      id: Date.now(),
      ts: Date.now(),
      hero: $("hero").value.trim(),
      focus: state.focus,
      hit: draft.hit,
      result: draft.result,
      better: better,
      diff: $("diff").value.trim(),
      trigger: $("trigger").value.trim()
    });
    save();
    // reset form (keep hero + focus)
    $("better").value=""; $("diff").value=""; $("trigger").value="";
    $("segHit").querySelectorAll("button").forEach(function(x){x.classList.remove("on");});
    draft.hit=""; validate();
    renderFocus(); renderAll(true);
    toast("Logged.");
  }

  // ---- export / import ----
  function doExport(){
    var blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "the-climb-log.json";
    a.click(); URL.revokeObjectURL(a.href);
    toast("Backup downloaded.");
  }
  function doImport(file){
    var r = new FileReader();
    r.onload = function(){
      try{
        var data = JSON.parse(r.result);
        if(data && Array.isArray(data.entries)){
          if(state.entries.length && !confirm("Replace your current log (" + state.entries.length + " entries) with this backup (" + data.entries.length + " entries)?")) return;
          state = { focus: data.focus||"", entries: data.entries, graduated: data.graduated||[], saved: data.saved||[] };
          save(); renderFocus(); renderAll(false);
          toast("Log restored.");
        } else { toast("That file doesn't look like a Climb log."); }
      }catch(e){ toast("Couldn't read that file."); }
    };
    r.readAsText(file);
  }

  // ---- init ----
  HEROES.forEach(function(h){ var o=document.createElement("option"); o.value=h; $("heroList").appendChild(o); });
  wireSeg("segHit","hit");
  wireSeg("segResult","result");
  $("better").addEventListener("input", validate);
  $("logBtn").addEventListener("click", logGame);
  ["hero","better","diff","trigger"].forEach(function(id){
    $(id).addEventListener("keydown", function(e){
      if((e.ctrlKey || e.metaKey) && e.key==="Enter" && !$("logBtn").disabled) logGame();
    });
  });
  $("exportBtn").addEventListener("click", doExport);
  $("importBtn").addEventListener("click", function(){ $("importFile").click(); });
  $("importFile").addEventListener("change", function(e){ if(e.target.files[0]) doImport(e.target.files[0]); e.target.value=""; });

  renderFocus();
  renderAll(false);
})();
</script>
</body>
</html>
